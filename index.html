<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>SmartHire ATS - Frontend</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
        pre { background: #eee; padding: 10px; overflow-x: auto; border-radius: 4px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>SmartHire: Система управління наймом</h1>

    <div id="auth-section" class="card">
        <h3>Авторизація</h3>
        <input type="email" id="email" placeholder="Email (admin@test.com)" value="admin@test.com">
        <input type="password" id="password" placeholder="Пароль (12345)" value="12345">
        <button onclick="login()">Увійти</button>
        <p id="auth-status"></p>
    </div>

    <div id="main-section" class="card hidden">
        <h3>Пошук кандидатів</h3>
        <input type="text" id="skill-input" placeholder="Введіть навичку (напр. Node.js)">
        <button onclick="searchCandidates()">Знайти</button>
        <div id="results"></div>
    </div>

    <script>
        // ЗАМІНИ ЦЮ АДРЕСУ НА СВОЮ ВІД RENDER
        const API_URL = "https://smarthire-5w6w.onrender.com/api";

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    document.getElementById('auth-status').innerText = "Вхід успішний!";
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('main-section').classList.remove('hidden');
                } else {
                    document.getElementById('auth-status').innerText = "Помилка: " + data.message;
                }
            } catch (err) {
                document.getElementById('auth-status').innerText = "Сервер не відповідає";
            }
        }

        async function searchCandidates() {
            const skill = document.getElementById('skill-input').value;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "Завантаження...";

            try {
                const response = await fetch(`${API_URL}/candidates/search?skill=${skill}`);
                const data = await response.json();
                
                if (data.length > 0) {
                    resultsDiv.innerHTML = `<h4>Знайдено: ${data.length}</h4><pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultsDiv.innerHTML = "Нікого не знайдено за цією навичкою.";
                }
            } catch (err) {
                resultsDiv.innerHTML = "Помилка при пошуку.";
            }
        }
    </script>
</body>
</html>
